services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: my-node-app:latest
    container_name: my-node-app
    restart: unless-stopped

    ports:
      - "0.0.0.0:3000:3000"           # HOST:CONTAINER — change left side to remap

    environment:
      NODE_ENV: production
      PORT: 3000

    env_file: 
      - .env
      # Add your env vars here, or use an env_file:
      # env_file: .env

    # Uncomment to mount source for local dev (use target: build instead)
    # volumes:
    #   - .:/app
    #   - /app/node_modules

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
